<nav
  class="fixed left-0 top-0 w-64 h-screen bg-slate-800 text-slate-100 p-0 shadow-lg overflow-y-auto"
>
  <div class="px-5 py-5 border-b border-slate-700 mb-5">
    <h2 class="m-0 text-xl font-semibold text-white">Thesis Manager</h2>
  </div>

  <ul class="list-none p-0 m-0">
    @for (item of menuItems; track item.link) {
      <li [class]="{ 'bg-blue-600': isActive(item) }">
        <a
          [routerLink]="item.link"
          class="flex items-center px-5 py-4 text-slate-100 no-underline transition-all duration-300 border-l-4 border-transparent cursor-pointer hover:bg-slate-700 hover:pl-6"
          [class.bg-blue-600]="isActive(item)"
          [class.border-l-blue-400]="isActive(item)"
          [class.font-semibold]="isActive(item)"
        >
          <span class="text-xl w-6 text-center mr-4">{{ item.icon }}</span>
          <span class="text-sm font-medium">{{ item.title }}</span>
        </a>
      </li>
    }
  </ul>
</nav>
