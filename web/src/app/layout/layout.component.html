<div class="flex h-screen">
  <app-sidebar
    [menuItems]="menuItems"
    [collapsed]="sidebarCollapsed()"
    (collapsedChange)="toggleSidebar()"
  ></app-sidebar>
  <main
    [class]="
      sidebarCollapsed()
        ? 'flex-1 overflow-y-auto p-5 bg-slate-50 transition-[margin-left] duration-300 ml-20 lg:ml-20'
        : 'flex-1 overflow-y-auto p-5 bg-slate-50 transition-[margin-left] duration-300 ml-0 lg:ml-64'
    "
  >
    <router-outlet></router-outlet>
  </main>
</div>
