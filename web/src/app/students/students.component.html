<div class="p-2">
  <h1 class="text-2xl font-bold text-slate-800 mb-6">Alunos</h1>

  <div class="mb-4 flex gap-2">
    <input
      [(ngModel)]="search"
      (ngModelChange)="load()"
      placeholder="Buscar por nome ou matrícula..."
      class="border border-slate-300 rounded-md px-3 py-2 w-full max-w-sm text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
  </div>

  <div class="overflow-x-auto rounded-lg shadow bg-white">
    <table class="min-w-full text-sm">
      <thead class="bg-slate-800 text-white">
        <tr>
          <th class="px-4 py-3 text-left">ID</th>
          <th class="px-4 py-3 text-left">Nome</th>
          <th class="px-4 py-3 text-left">Matrícula</th>
          <th class="px-4 py-3 text-left">Curso</th>
        </tr>
      </thead>
      <tbody>
        @if (loading) {
          <tr><td colspan="4" class="text-center py-8 text-slate-400">Carregando...</td></tr>
        } @else if (alunos.length === 0) {
          <tr><td colspan="4" class="text-center py-8 text-slate-400">Nenhum aluno encontrado.</td></tr>
        } @else {
          @for (a of alunos; track a.id) {
            <tr class="border-b border-slate-100 hover:bg-slate-50">
              <td class="px-4 py-3 text-slate-500">{{ a.id }}</td>
              <td class="px-4 py-3 font-medium">{{ a.nome }}</td>
              <td class="px-4 py-3">{{ a.matricula }}</td>
              <td class="px-4 py-3">{{ getCursoNome(a.curso) }}</td>
            </tr>
          }
        }
      </tbody>
    </table>
  </div>
</div>
