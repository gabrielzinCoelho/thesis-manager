<nav [class]="getSidebarClasses()">
  <div [class]="getHeaderClasses()">
    @if (!collapsed) {
      <h2 class="m-0 text-xl font-semibold text-white">Thesis Manager</h2>
    }

    <button
      type="button"
      (click)="toggleSidebar()"
      class="flex h-9 w-9 items-center justify-center rounded-md text-slate-100 transition-colors hover:bg-slate-700"
      [attr.aria-label]="collapsed ? 'Expand sidebar' : 'Collapse sidebar'"
    >
      <mat-icon class="h-6 w-6 text-slate-100">
        {{ collapsed ? 'chevron_right' : 'chevron_left' }}
      </mat-icon>
    </button>
  </div>

  <ul class="list-none p-0 m-0">
    @for (item of menuItems; track item.link) {
      <li>
        <a [routerLink]="item.link" [class]="getItemClasses(item)">
          <mat-icon class="h-6 w-6 shrink-0 text-slate-100" [class.mr-4]="!collapsed">{{
            item.icon
          }}</mat-icon>
          @if (!collapsed) {
            <span class="text-sm font-medium">{{ item.title }}</span>
          }
        </a>
      </li>
    }
  </ul>
</nav>
